<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bgQ" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#16102a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bgQ)"/>

  <!-- Grid -->
  <g stroke="#ffffff06" stroke-width="1">
    <line x1="0" y1="125" x2="800" y2="125"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>

  <!-- Process board -->
  <rect x="60" y="88" width="460" height="324" rx="10" fill="#0d0d17" stroke="#a78bfa25" stroke-width="1"/>

  <!-- Board header -->
  <rect x="60" y="88" width="460" height="40" rx="10" fill="#a78bfa15"/>
  <rect x="60" y="116" width="460" height="12" fill="#a78bfa15"/>
  <text x="280" y="114" font-family="sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="700" letter-spacing="1">CYCLE D'AMÉLIORATION CONTINUE</text>

  <!-- PDCA stages -->
  <!-- Plan -->
  <rect x="80" y="148" width="200" height="64" rx="8" fill="#a78bfa10" stroke="#a78bfa30" stroke-width="1"/>
  <text x="90" y="168" font-family="monospace" font-size="9" fill="#a78bfa" font-weight="700">PLAN · Planifier</text>
  <text x="90" y="184" font-family="sans-serif" font-size="11" fill="#e2e8f0">Cartographie processus</text>
  <text x="90" y="200" font-family="sans-serif" font-size="10" fill="#94a3b8">Audit · Diagnostic · KPIs</text>
  <rect x="80" y="207" width="140" height="4" rx="2" fill="#a78bfa20"/>
  <rect x="80" y="207" width="140" height="4" rx="2" fill="#a78bfa"/>

  <!-- Do -->
  <rect x="300" y="148" width="200" height="64" rx="8" fill="#a78bfa10" stroke="#a78bfa30" stroke-width="1"/>
  <text x="310" y="168" font-family="monospace" font-size="9" fill="#a78bfa" font-weight="700">DO · Déployer</text>
  <text x="310" y="184" font-family="sans-serif" font-size="11" fill="#e2e8f0">Procédures &amp; guides</text>
  <text x="310" y="200" font-family="sans-serif" font-size="10" fill="#94a3b8">Scripts · Fiches réflexes</text>
  <rect x="300" y="207" width="170" height="4" rx="2" fill="#a78bfa20"/>
  <rect x="300" y="207" width="170" height="4" rx="2" fill="#a78bfa" opacity="0.85"/>

  <!-- Check -->
  <rect x="80" y="228" width="200" height="64" rx="8" fill="#a78bfa08" stroke="#a78bfa25" stroke-width="1"/>
  <text x="90" y="248" font-family="monospace" font-size="9" fill="#a78bfa" font-weight="700">CHECK · Mesurer</text>
  <text x="90" y="264" font-family="sans-serif" font-size="11" fill="#e2e8f0">Suivi NPS &amp; conformité</text>
  <text x="90" y="280" font-family="sans-serif" font-size="10" fill="#94a3b8">Tableaux de bord qualité</text>
  <rect x="80" y="287" width="120" height="4" rx="2" fill="#a78bfa20"/>
  <rect x="80" y="287" width="120" height="4" rx="2" fill="#a78bfa" opacity="0.6"/>

  <!-- Act -->
  <rect x="300" y="228" width="200" height="64" rx="8" fill="#a78bfa08" stroke="#a78bfa25" stroke-width="1"/>
  <text x="310" y="248" font-family="monospace" font-size="9" fill="#a78bfa" font-weight="700">ACT · Ajuster</text>
  <text x="310" y="264" font-family="sans-serif" font-size="11" fill="#e2e8f0">Corrections &amp; standards</text>
  <text x="310" y="280" font-family="sans-serif" font-size="10" fill="#94a3b8">12 processus optimisés</text>
