  <rect x="220" y="346" width="247" height="8" rx="4" fill="#a78bfa" opacity="0.9"/>
  <text x="490" y="356" font-family="monospace" font-size="9" fill="#a78bfa">95%</text>

  <text x="92" y="376" font-family="monospace" font-size="9" fill="#94a3b8">NPS interne (+15 pts)</text>
  <rect x="220" y="366" width="260" height="8" rx="4" fill="#ffffff08"/>
  <rect x="220" y="366" width="234" height="8" rx="4" fill="#a78bfa" opacity="0.9"/>
  <text x="490" y="376" font-family="monospace" font-size="9" fill="#a78bfa">+15</text>

  <!-- KPI panel right -->
  <rect x="545" y="88" width="215" height="324" rx="10" fill="#0d0d17" stroke="#a78bfa18" stroke-width="1"/>
  <text x="652" y="118" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle" letter-spacing="1">IMPACT QUALITÉ</text>

  <text x="652" y="160" font-family="monospace" font-size="36" fill="#a78bfa" text-anchor="middle" font-weight="800">12</text>
  <text x="652" y="182" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">processus optimisés</text>

  <line x1="565" y1="200" x2="745" y2="200" stroke="#a78bfa18" stroke-width="1"/>

  <text x="652" y="238" font-family="monospace" font-size="32" fill="#a78bfa" text-anchor="middle" font-weight="800">-30%</text>
  <text x="652" y="258" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">temps d'intégration</text>

  <line x1="565" y1="276" x2="745" y2="276" stroke="#a78bfa18" stroke-width="1"/>

  <text x="652" y="314" font-family="monospace" font-size="32" fill="#a78bfa" text-anchor="middle" font-weight="800">+15</text>
  <text x="652" y="334" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">points NPS interne</text>

  <line x1="565" y1="352" x2="745" y2="352" stroke="#a78bfa18" stroke-width="1"/>

  <text x="652" y="388" font-family="monospace" font-size="32" fill="#a78bfa" text-anchor="middle" font-weight="800">3 ans</text>
  <text x="652" y="408" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">chez SFR</text>

  <!-- Title -->
  <text x="400" y="46" font-family="monospace" font-size="13" fill="#c8c8d0" text-anchor="middle" font-weight="600" letter-spacing="2">CHARGÉ DE QUALITÉ, FORMATION &amp; MÉTHODES</text>
  <text x="400" y="64" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle" letter-spacing="1">SFR · 2012 – 2015</text>
